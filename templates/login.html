<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Вход</title>

<style>

body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial;

background:linear-gradient(
135deg,
#0f172a,
#1e293b
);

}

.box{

background:white;
padding:40px;
border-radius:20px;
width:300px;

text-align:center;

}

input{

width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;

}

button{

width:100%;
padding:12px;

border:none;

background:#2563eb;
color:white;

border-radius:10px;

cursor:pointer;

}

.error{

color:red;
font-size:14px;

}

</style>

</head>

<body>

<div class="box">

<h2>Система очистки сточных вод</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Логин"
required>

<input
type="password"
name="password"
placeholder="Пароль"
required>

<button type="submit">

Войти

</button>

</form>

<p class="error">

{{error}}

</p>

</div>

</body>

</html>
